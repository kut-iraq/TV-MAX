<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faustus TV</title>

<style>

body {
    margin: 0;
    font-family: 'Cairo', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #1e3a8a);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 30px;
    padding: 30px;
    width: 360px;
    text-align: center;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
    animation: fadeIn 1s ease;
}

.logo {
    width: 95px;
    height: 95px;
    border-radius: 22px;
    margin-bottom: 15px;
    box-shadow: 0 0 20px rgba(59,130,246,0.6);
}

h1 {
    margin: 10px 0;
    font-size: 28px;
    font-weight: 900;
    text-shadow: 0 0 10px rgba(59,130,246,0.7);
}

.desc {
    color: #cbd5e1;
    font-size: 15px;
    font-weight: 600;
}

.version {
    color: #38bdf8;
    font-weight: bold;
    margin: 15px 0;
}

.info-box {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.box {
    background: rgba(255,255,255,0.08);
    padding: 12px;
    border-radius: 15px;
    width: 30%;
    font-weight: bold;
    transition: 0.3s;
}

.box:hover {
    transform: scale(1.08);
    background: rgba(255,255,255,0.15);
}

.box span {
    display: block;
    margin-top: 5px;
    color: #94a3b8;
    font-size: 13px;
}

.btn {
    display: block;
    background: linear-gradient(90deg, #2563eb, #06b6d4);
    padding: 16px;
    border-radius: 15px;
    margin: 12px 0;
    text-decoration: none;
    color: white;
    font-weight: 800;
    font-size: 16px;
    transition: 0.3s;
    box-shadow: 0 0 20px rgba(37,99,235,0.5);
}

.btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 0 30px rgba(6,182,212,0.8);
}

.features {
    margin-top: 20px;
}

.feature {
    background: rgba(255,255,255,0.08);
    padding: 13px;
    border-radius: 12px;
    margin: 10px 0;
    font-weight: 600;
}

.telegram-btn {
    background: linear-gradient(90deg, #0284c7, #0ea5e9);
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(20px);}
    to {opacity:1; transform: translateY(0);}
}

</style>
</head>

<body>

<div class="container">

    <img src="https://up6.cc/2026/07/178309272880441.jpeg" class="logo">

    <h1>MAX TV</h1>

    <p class="desc">
        تطبيق احترافي سريع وآمن يوفر أفضل تجربة للمستخدم
        مع تصميم عصري وسهولة بالاستخدام
    </p>

    <div class="version">الإصدار 9.8.0</div>

    <div class="info-box">
        <div class="box">APK<span>أندرويد</span></div>
        <div class="box">8.9<span>التقييم</span></div>
        <div class="box">0.3<span>سرعة</span></div>
    </div>

    <!-- الأزرار مع روابطك -->
    <a href="https://pixeldrain.com/u/JacKPdsP" class="btn" target="_blank">
        تحميل التطبيق للاندرويد
    </a>

    <a href="https://linktr.ee/maaaghx_tv" class="btn" target="_blank">
        صفحة مشاهدة الايفون
    </a>

    <div class="features">
        <h3>مميزات التطبيق</h3>
        <div class="feature">⚡ سرعة عالية وأداء ممتاز</div>
        <div class="feature">🎨 واجهة حديثة وجذابة</div>
    </div>

    <div class="telegram">
        <h3>تواصل عبر تليجرام 💬</h3>
        <a href="https://t.me/kut_max2024" class="btn telegram-btn" target="_blank">
            فتح تيليجرام
        </a>
    </div>

</div>

</body>
</html>
